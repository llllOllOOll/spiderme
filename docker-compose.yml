services:
  db:
    container_name: dspider_db
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=spider
      - POSTGRES_PASSWORD=spider
      - POSTGRES_DB=spider_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spider"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: {}
