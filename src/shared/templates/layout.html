<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider — Zig Web Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/spider.css">
<script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <img src="/spider_logo.png" alt="Spider" width="20" height="20">
      Spider
    </a>
    <div class="nav-links">
      <a href="/docs">Docs</a>
      <a href="#features">Features</a>
      <a href="https://github.com/llllOllOOll/spider" target="_blank" class="nav-github">GitHub</a>
    </div>
    <button class="nav-hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="nav-mobile" id="mobile-menu">
  <a href="/docs" onclick="toggleMenu()">Docs</a>
  <a href="#features" onclick="toggleMenu()">Features</a>
  <a href="https://github.com/llllOllOOll/spider" target="_blank">GitHub</a>
</div>

<div class="page-content">
  { slot }
</div>

<script>
function toggleMenu() {
  const menu = document.getElementById('mobile-menu');
  const btn  = document.getElementById('hamburger');
  menu.classList.toggle('open');
  btn.classList.toggle('open');
}
</script>

</body>
</html>
