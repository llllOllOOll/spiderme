<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider — Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/spider.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
hljs.highlightAll();
document.addEventListener("htmx:beforeRequest", () => {
  document.getElementById("doc-content").innerHTML = `
    <div class="skeleton" style="height:28px;width:45%;margin-bottom:20px;"></div>
    <div class="skeleton" style="height:14px;width:90%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:14px;width:82%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:14px;width:87%;margin-bottom:28px;"></div>
    <div class="skeleton" style="height:110px;width:100%;margin-bottom:20px;"></div>
    <div class="skeleton" style="height:14px;width:78%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:14px;width:85%;"></div>
  `;
});
document.addEventListener("htmx:afterSwap", (e) => {
  e.detail.target.querySelectorAll("pre code").forEach((block) => {
    hljs.highlightElement(block);
  });
});
</script>
</head>
<body>
<SiteNav />

<div class="docs-layout">

  <aside class="docs-sidebar">
    <div class="sidebar-group">
      <div class="sidebar-group-label">Getting Started</div>
      <a class="sidebar-link active" hx-get="/docs/quickstart" hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Quick Start</a>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-label">Core</div>
      <a class="sidebar-link" hx-get="/docs/router"     hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Router</a>
      <a class="sidebar-link" hx-get="/docs/request"    hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Request</a>
      <a class="sidebar-link" hx-get="/docs/response"   hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Response</a>
      <a class="sidebar-link" hx-get="/docs/middleware" hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Middleware</a>
      <a class="sidebar-link" hx-get="/docs/groups"     hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Group Routes</a>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-label">Features</div>
      <a class="sidebar-link" hx-get="/docs/postgresql" hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">PostgreSQL</a>
      <a class="sidebar-link" hx-get="/docs/pooling"    hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Pooling</a>
      <a class="sidebar-link" hx-get="/docs/websocket"  hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">WebSocket</a>
      <a class="sidebar-link" hx-get="/docs/templates"  hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Templates</a>
      <a class="sidebar-link" hx-get="/docs/static"     hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Static Files</a>
      <a class="sidebar-link" hx-get="/docs/metrics"    hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Metrics</a>
      <a class="sidebar-link" hx-get="/docs/logger"     hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Logger</a>
      <a class="sidebar-link" hx-get="/docs/shutdown"   hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Graceful Shutdown</a>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-label">New Features</div>
      <a class="sidebar-link" hx-get="/docs/auth"        hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Authentication</a>
      <a class="sidebar-link" hx-get="/docs/http-client" hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">HTTP Client</a>
      <a class="sidebar-link" hx-get="/docs/forms"       hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">FormData</a>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-label">Deployment</div>
      <a class="sidebar-link" hx-get="/docs/docker"  hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Docker</a>
      <a class="sidebar-link" hx-get="/docs/testing" hx-target="#doc-content" hx-swap="innerHTML" onclick="setActive(this)">Testing</a>
    </div>
  </aside>

  <main class="docs-content">
    <div id="doc-content">
      { slot }
    </div>
  </main>

  <aside class="on-this-page" id="on-this-page">
    { slot_toc }
  </aside>

</div>

<script>
function setActive(el) {
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  el.classList.add('active');
}
function toggleMenu() {
  const menu = document.getElementById('mobile-menu');
  const btn  = document.getElementById('hamburger');
  menu.classList.toggle('open');
  btn.classList.toggle('open');
}
</script>

</body>
</html>
