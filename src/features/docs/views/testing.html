{% extends "layout_docs" %}
{% block "content" %}
<h1>Testing</h1>
<p>Spider uses standard Zig testing. Run tests and format your code with these commands.</p>

<div class="code-block">
<div class="code-block-bar"><span class="code-block-lang">sh</span></div>
<pre><span class="c"># Run all tests</span>
zig test .

<span class="c"># Format all source files</span>
zig fmt .

<span class="c"># Build optimized release</span>
zig build -Doptimize=ReleaseSmall</pre>
</div>
{% end %}
